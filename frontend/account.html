<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Account — SEREN</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
  <header class="nav nav-simple"><a class="logo" href="./index.html">SEREN</a><div class="nav-search-wrap"><svg class="nav-si" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input class="nav-search-input" type="search" placeholder="Search products, collections…" autocomplete="off" /></div><div class="nav-cta"><a class="login-link" href="./login.html">Login</a><a class="register-link" href="./register.html">Sign Up</a><div class="profile-wrap" id="profileWrap" style="display:none"><button class="icon-btn profile-btn" id="profileBtn" aria-label="My Account"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button><div class="profile-dropdown" id="profileDropdown"><a href="./my-orders.html" class="pd-item">My Orders</a><a href="./account.html" class="pd-item">Edit Profile</a><button class="pd-item logout-btn nav-logout">Log Out</button></div></div><a class="cart-link icon-btn" href="./cart.html" aria-label="Cart"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.16"/></svg><span class="cart-badge" id="cartCount" style="display:none">0</span></a></div></header>

  <main class="account-page">
    <h1>My Account</h1>
    <p id="accountSubtitle" class="account-subtitle"></p>

    <!-- Edit Profile -->
    <div class="account-card">
      <h2>Edit Profile</h2>
      <form id="profileForm" novalidate>
        <label>Full Name
          <input id="pName" type="text" placeholder="Your full name" autocomplete="name" />
        </label>
        <label>Email Address
          <input id="pEmail" type="email" autocomplete="email" readonly style="opacity:0.5;cursor:not-allowed;" />
        </label>
        <button type="submit" class="btn btn-dark">Save Changes</button>
        <p id="profileMsg" class="account-msg" aria-live="polite"></p>
      </form>
    </div>

    <!-- Change Password -->
    <div class="account-card">
      <h2>Change Password</h2>
      <form id="passwordForm" novalidate>
        <label>Current Password
          <input id="curPass" type="password" placeholder="Current password" autocomplete="current-password" />
        </label>
        <label>New Password
          <input id="newPass" type="password" placeholder="New password (min 8 chars)" autocomplete="new-password" />
        </label>
        <label>Confirm New Password
          <input id="confPass" type="password" placeholder="Confirm new password" autocomplete="new-password" />
        </label>
        <button type="submit" class="btn btn-dark">Update Password</button>
        <p id="passMsg" class="account-msg" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <footer class="footer"></footer>

  <script type="module">
    import { apiRequest, isLoggedIn, saveTokens } from './js/api.js';
    import { syncCartCount } from './js/cart.js?v=3';
    import { renderFooter } from './js/footer.js';
    import { initNavSearch } from './js/navSearch.js';

    if (!isLoggedIn()) location.href = `./login.html?next=${encodeURIComponent(location.pathname)}`;

    syncCartCount();
    initNavSearch();
    renderFooter();

    // Load current profile
    try {
      const me = await apiRequest('/api/auth/me/', 'GET', null, true);
      document.getElementById('accountSubtitle').textContent = `Logged in as ${me.email}`;
      document.getElementById('pName').value  = me.name  || '';
      document.getElementById('pEmail').value = me.email || '';
    } catch {
      document.getElementById('accountSubtitle').textContent = '';
    }

    // Edit profile
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const msg = document.getElementById('profileMsg');
      btn.disabled = true; btn.textContent = 'Saving…';
      msg.textContent = '';
      try {
        const res = await apiRequest('/api/auth/me/', 'PATCH', {
          name: document.getElementById('pName').value.trim(),
        }, true);
        // Save new tokens if the server issued them (e.g. email changed)
        if (res.access && res.refresh) {
          saveTokens(res.access, res.refresh, res.role, res.name, true);
        }
        document.getElementById('accountSubtitle').textContent = `Logged in as ${res.email}`;
        msg.textContent = '✓ Profile updated!';
        msg.style.color = '#25d366';
      } catch (err) {
        const errs = err.payload || {};
        msg.textContent = Object.values(errs).flat().join(' ') || err.message || 'Failed to update.';
        msg.style.color = '#ff6b6b';
      } finally {
        btn.disabled = false; btn.textContent = 'Save Changes';
      }
    });

    // Change password
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const msg = document.getElementById('passMsg');
      const np  = document.getElementById('newPass').value;
      const cp  = document.getElementById('confPass').value;
      msg.textContent = '';

      if (np !== cp) {
        msg.textContent = 'New passwords do not match.';
        msg.style.color = '#ff6b6b';
        return;
      }
      if (np.length < 8) {
        msg.textContent = 'Password must be at least 8 characters.';
        msg.style.color = '#ff6b6b';
        return;
      }
      btn.disabled = true; btn.textContent = 'Updating…';
      try {
        const res = await apiRequest('/api/auth/me/', 'PATCH', {
          current_password: document.getElementById('curPass').value,
          password: np,
        }, true);
        if (res.access && res.refresh) {
          saveTokens(res.access, res.refresh, res.role, res.name, true);
        }
        e.target.reset();
        msg.textContent = '✓ Password changed successfully!';
        msg.style.color = '#25d366';
      } catch (err) {
        const errs = err.payload || {};
        msg.textContent = Object.values(errs).flat().join(' ') || err.message || 'Failed to update.';
        msg.style.color = '#ff6b6b';
      } finally {
        btn.disabled = false; btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
