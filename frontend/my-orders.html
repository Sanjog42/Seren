<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Orders — SEREN</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/main.css" />
  <style>
    .orders-page {
      width: min(860px, 100% - 2.8rem);
      margin: 2rem auto 4rem;
    }
    .orders-page h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin-bottom: 0.2rem;
    }
    .orders-page > p {
      color: #b8c9cc;
      margin: 0 0 1.8rem;
    }
    .order-card {
      background: linear-gradient(160deg, #141414, #0f0f0f);
      border: 1px solid #242424;
      border-radius: 14px;
      margin-bottom: 1rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .order-card:hover { border-color: #2f5a62; }
    .order-header {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: center;
      padding: 0.9rem 1.1rem;
      border-bottom: 1px solid #1e1e1e;
    }
    .order-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.06em;
    }
    .order-meta {
      color: #909090;
      font-size: 0.85rem;
    }
    .order-total {
      margin-left: auto;
      font-weight: 700;
      font-size: 1rem;
    }
    @media (max-width: 500px) {
      .orders-page {
        width: calc(100% - 1.6rem);
        margin: 1.2rem auto 3rem;
      }
      .order-header {
        gap: 0.4rem 0.7rem;
        padding: 0.75rem 0.85rem;
      }
      .order-total {
        margin-left: 0;
        width: 100%;
        padding-top: 0.2rem;
        border-top: 1px solid #1e1e1e;
        font-size: 1.05rem;
        color: #00e5ff;
      }
      .order-items {
        padding: 0.6rem 0.85rem 0.85rem;
      }
      .order-item-row {
        font-size: 0.84rem;
        flex-wrap: wrap;
        gap: 0.2rem 0.4rem;
      }
      .item-price {
        margin-left: auto;
      }
    }
    .order-status {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      border: 1px solid;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .order-items {
      padding: 0.7rem 1.1rem 1rem;
    }
    .order-item-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.35rem 0;
      border-bottom: 1px solid #181818;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .order-item-row:last-child { border-bottom: none; }
    .item-name { flex: 1; }
    .item-size { color: #909090; font-size: 0.82rem; min-width: 40px; }
    .item-qty  { color: #909090; font-size: 0.82rem; text-align: center; min-width: 36px; }
    .item-price { font-weight: 600; text-align: right; min-width: 90px; }
    .empty-orders {
      text-align: center;
      padding: 3rem 1rem;
      color: #909090;
    }
    .empty-orders h2 { margin-bottom: 0.5rem; }

    /* ── Star rating input (review modal) ─────────────────────── */
    .rv-star {
      font-size: 1.9rem;
      background: none;
      border: none;
      cursor: pointer;
      color: #2e2e2e;
      line-height: 1;
      padding: 0 1px;
      transition: color 0.1s, transform 0.1s;
    }
    .rv-star.rv-filled { color: #f5c518; }
    .rv-star.rv-hover  { color: #f5c518; transform: scale(1.18); }
  </style>
</head>
<body>
  <header class="nav nav-simple"><a class="logo" href="./index.html">SEREN</a><div class="nav-search-wrap"><svg class="nav-si" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input class="nav-search-input" type="search" placeholder="Search products, collections…" autocomplete="off" /></div><div class="nav-cta"><a class="login-link" href="./login.html">Login</a><a class="register-link" href="./register.html">Sign Up</a><div class="profile-wrap" id="profileWrap" style="display:none"><button class="icon-btn profile-btn" id="profileBtn" aria-label="My Account"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button><div class="profile-dropdown" id="profileDropdown"><a href="./my-orders.html" class="pd-item">My Orders</a><a href="./account.html" class="pd-item">Edit Profile</a><button class="pd-item logout-btn nav-logout">Log Out</button></div></div><a class="cart-link icon-btn" href="./cart.html" aria-label="Cart"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.16"/></svg><span class="cart-badge" id="cartCount" style="display:none">0</span></a></div></header>

  <main class="orders-page">
    <h1>My Orders</h1>
    <p>Your full order history with Seren.</p>
    <div id="ordersRoot"><p style="color:#888">Loading your orders…</p></div>
  </main>

  <footer class="footer"></footer>

  <script type="module">
    import { apiRequest, isLoggedIn, getRole } from './js/api.js';
    import { syncCartCount } from './js/cart.js?v=3';
    import { renderFooter } from './js/footer.js';
    import { initNavSearch } from './js/navSearch.js';

    // Guard — customers only
    if (!isLoggedIn() || getRole() !== 'customer') {
      location.href = `./login.html?next=${encodeURIComponent(location.pathname)}`;
    }

    syncCartCount();
    initNavSearch();

    const STATUS_COLORS = {
      pending:           '#a0a0a0',
      confirmed:         '#ff9ec4',
      sent_for_delivery: '#00e5ff',
      completed:         '#25d366',
      cancelled:         '#ff3d3d',
    };
    const STATUS_LABELS = {
      pending:           'Pending',
      confirmed:         'Confirmed',
      sent_for_delivery: 'Sent for Delivery',
      completed:         'Completed',
      cancelled:         'Cancelled',
    };

    const root = document.getElementById('ordersRoot');

    try {
      const orders = await apiRequest('/api/orders/my/', 'GET', null, true);

      if (!orders.length) {
        root.innerHTML = `
          <div class="empty-orders">
            <h2>No orders yet</h2>
            <p>Once you place an order it will appear here.</p>
            <a class="btn" href="./kits.html" style="display:inline-block;margin-top:1rem">Start Shopping</a>
          </div>`;
      } else {
        root.innerHTML = orders.map(o => {
          const color = STATUS_COLORS[o.status] || '#888';
          const label = STATUS_LABELS[o.status] || o.status;
          const date  = new Date(o.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

          const itemRows = o.items.map(i => `
            <div class="order-item-row">
              <span class="item-name">${i.product_name}</span>
              <span class="item-size">${(i.size && i.size !== 'Free Size' && i.size !== 'No Size') ? i.size : ''}</span>
              <span class="item-qty">× ${i.quantity}</span>
              <span class="item-price">NPR ${Number(i.price_at_purchase).toFixed(2)}</span>
            </div>`).join('');

          const cancelBtn = o.status === 'pending'
            ? `<button class="cancel-order-btn" data-id="${o.id}" style="
                margin-top:0.6rem;padding:0.35rem 0.9rem;font-size:0.82rem;font-weight:600;
                background:transparent;border:1px solid #ff3d3d;color:#ff3d3d;border-radius:6px;cursor:pointer">
                Cancel Order
               </button>`
            : '';

          const reviewBtn = (o.status === 'completed' && !o.has_reviewed)
            ? `<button class="review-order-btn" data-id="${o.id}" style="
                margin-top:0.6rem;padding:0.35rem 0.9rem;font-size:0.82rem;font-weight:600;
                background:transparent;border:1px solid #f5c518;color:#f5c518;border-radius:6px;cursor:pointer">
                ★ Leave a Review
               </button>`
            : (o.status === 'completed' && o.has_reviewed)
            ? `<p style="font-size:0.82rem;color:#25d366;margin:0.5rem 0 0">✓ Thank you for your review!</p>`
            : '';

          const cancelReason = (o.status === 'cancelled' && o.cancellation_reason)
            ? `<p style="font-size:0.8rem;color:#ff9e9e;margin:0.4rem 0 0;padding:0 1.1rem 0.8rem">
                Reason: ${o.cancellation_reason}
               </p>`
            : '';

          return `
            <div class="order-card">
              <div class="order-header">
                <span class="order-num">Order #${o.id}</span>
                <span class="order-meta">${date}</span>
                <span class="order-status"
                  style="background:${color}20;color:${color};border-color:${color}40">
                  ${label}
                </span>
                <span class="order-total">NPR ${(Number(o.total_amount) + Number(o.delivery_charge || 0)).toFixed(2)}</span>
              </div>
              <div class="order-items">
                ${itemRows || '<p style="color:#888;font-size:0.88rem;margin:0">No items.</p>'}
                ${cancelBtn}
                ${reviewBtn}
              </div>
              ${cancelReason}
            </div>`;
        }).join('');
      }
      // ── Cancel order modal ──────────────────────────────────────────────────
      function showCancelModal(orderId, triggerBtn) {
        // Remove any existing modal
        document.getElementById('cancelModal')?.remove();

        const modal = document.createElement('div');
        modal.id = 'cancelModal';
        modal.style.cssText = `
          position:fixed;inset:0;background:rgba(0,0,0,0.7);
          display:flex;align-items:center;justify-content:center;
          z-index:9999;padding:1rem`;
        modal.innerHTML = `
          <div style="
            background:#141414;border:1px solid #2a2a2a;border-radius:14px;
            padding:1.5rem;width:min(440px,100%);box-shadow:0 8px 40px rgba(0,0,0,0.6)">
            <h3 style="margin:0 0 0.3rem;font-size:1.15rem">Cancel Order #${orderId}</h3>
            <p style="color:#909090;font-size:0.85rem;margin:0 0 1rem">
              Please tell us why you want to cancel this order.
            </p>
            <textarea id="customerCancelReason" rows="3" placeholder="Enter reason… (required)"
              style="
                width:100%;box-sizing:border-box;background:#1a1a1a;border:1px solid #333;
                border-radius:8px;color:#fff;padding:0.6rem 0.8rem;font-size:0.9rem;
                font-family:inherit;resize:vertical;outline:none"></textarea>
            <p id="cancelReasonErr" style="color:#ff3d3d;font-size:0.82rem;margin:0.3rem 0 0;display:none">
              Please enter a reason before cancelling.
            </p>
            <div style="display:flex;gap:0.6rem;margin-top:1rem;flex-wrap:wrap">
              <button id="cancelConfirmBtn" style="
                flex:1;padding:0.55rem;border:1px solid #ff3d3d;background:transparent;
                color:#ff3d3d;border-radius:8px;font-weight:600;cursor:pointer;font-size:0.9rem">
                Confirm Cancellation
              </button>
              <button id="cancelBackBtn" style="
                flex:1;padding:0.55rem;border:1px solid #333;background:transparent;
                color:#aaa;border-radius:8px;cursor:pointer;font-size:0.9rem">
                Go Back
              </button>
            </div>
          </div>`;

        document.body.appendChild(modal);

        modal.querySelector('#cancelBackBtn').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

        modal.querySelector('#cancelConfirmBtn').addEventListener('click', async () => {
          const reason  = modal.querySelector('#customerCancelReason').value.trim();
          const errEl   = modal.querySelector('#cancelReasonErr');
          if (!reason) { errEl.style.display = ''; return; }
          errEl.style.display = 'none';

          const confirmBtn = modal.querySelector('#cancelConfirmBtn');
          confirmBtn.disabled = true; confirmBtn.textContent = 'Cancelling…';
          triggerBtn.disabled = true;

          try {
            await apiRequest(`/api/orders/my/${orderId}/cancel/`, 'POST', { reason }, true);
            modal.remove();
            location.reload();
          } catch (e) {
            confirmBtn.disabled = false; confirmBtn.textContent = 'Confirm Cancellation';
            triggerBtn.disabled = false;
            errEl.textContent = e?.message || 'Failed to cancel. Please try again.';
            errEl.style.display = '';
          }
        });
      }

      // Wire cancel buttons
      root.querySelectorAll('.cancel-order-btn').forEach(btn => {
        btn.addEventListener('click', () => showCancelModal(btn.dataset.id, btn));
      });

      // ── Review modal ────────────────────────────────────────────────────────
      function showReviewModal(orderId, items) {
        document.getElementById('reviewModal')?.remove();

        // Deduplicate by product id; skip custom bouquet items
        const seen = new Set();
        const reviewable = items.filter(i => {
          if (i.is_custom_bouquet_item || !i.product) return false;
          if (seen.has(i.product)) return false;
          seen.add(i.product);
          return true;
        });
        if (!reviewable.length) return;

        const modal = document.createElement('div');
        modal.id = 'reviewModal';
        modal.style.cssText = `
          position:fixed;inset:0;background:rgba(0,0,0,0.75);
          display:flex;align-items:center;justify-content:center;
          z-index:9999;padding:1rem;overflow-y:auto`;
        modal.innerHTML = `
          <div style="
            background:#141414;border:1px solid #2a2a2a;border-radius:14px;
            padding:1.5rem;width:min(480px,100%);box-shadow:0 8px 48px rgba(0,0,0,0.7);
            margin:auto">
            <h3 style="margin:0 0 0.25rem;font-size:1.15rem">Review Order #${orderId}</h3>
            <p style="color:#888;font-size:0.84rem;margin:0 0 1.2rem">
              Stars are required · comments are optional
            </p>

            ${reviewable.map(item => `
            <div class="rv-item" style="margin-bottom:1.1rem;padding-bottom:1.1rem;border-bottom:1px solid #1e1e1e">
              <p style="font-weight:600;font-size:0.95rem;margin:0 0 0.45rem">${item.product_name}</p>
              <div class="rv-stars" data-pid="${item.product}" style="margin-bottom:0.35rem">
                ${[1,2,3,4,5].map(n => `<button type="button" class="rv-star" data-val="${n}" title="${n} star${n>1?'s':''}">★</button>`).join('')}
              </div>
              <p class="rv-err" data-for="${item.product}"
                style="color:#ff3d3d;font-size:0.78rem;margin:0 0 0.35rem;display:none">
                Please select a star rating.
              </p>
              <textarea class="rv-body" data-pid="${item.product}" rows="2"
                placeholder="Add a comment… (optional)"
                style="width:100%;box-sizing:border-box;background:#1a1a1a;border:1px solid #2e2e2e;
                       border-radius:8px;color:#eee;padding:0.5rem 0.75rem;font-size:0.85rem;
                       font-family:inherit;resize:vertical;outline:none;transition:border-color 0.2s"
                onfocus="this.style.borderColor='#444'" onblur="this.style.borderColor='#2e2e2e'"></textarea>
            </div>`).join('')}

            <div style="display:flex;gap:0.6rem;margin-top:0.2rem;flex-wrap:wrap">
              <button id="submitReviewBtn" style="
                flex:1;padding:0.58rem;border:1px solid #f5c518;background:transparent;
                color:#f5c518;border-radius:8px;font-weight:600;cursor:pointer;font-size:0.9rem">
                Submit Review
              </button>
              <button id="closeReviewModalBtn" style="
                flex:1;padding:0.58rem;border:1px solid #333;background:transparent;
                color:#aaa;border-radius:8px;cursor:pointer;font-size:0.9rem">
                Cancel
              </button>
            </div>
            <p id="reviewSubmitErr"
              style="color:#ff3d3d;font-size:0.82rem;margin:0.45rem 0 0;display:none"></p>
          </div>`;

        document.body.appendChild(modal);

        modal.querySelector('#closeReviewModalBtn').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

        // ── Star rating interaction ──────────────────────────────────────────
        const ratings = {};
        modal.querySelectorAll('.rv-stars').forEach(container => {
          const pid   = Number(container.dataset.pid);
          const stars = container.querySelectorAll('.rv-star');

          stars.forEach(star => {
            const val = Number(star.dataset.val);

            star.addEventListener('mouseenter', () =>
              stars.forEach(s => s.classList.toggle('rv-hover', Number(s.dataset.val) <= val)));
            star.addEventListener('mouseleave', () =>
              stars.forEach(s => s.classList.remove('rv-hover')));
            star.addEventListener('click', () => {
              ratings[pid] = val;
              stars.forEach(s => s.classList.toggle('rv-filled', Number(s.dataset.val) <= val));
              // Hide the per-item error once a star is chosen
              modal.querySelector(`.rv-err[data-for="${pid}"]`).style.display = 'none';
            });
          });
        });

        // ── Submit ───────────────────────────────────────────────────────────
        modal.querySelector('#submitReviewBtn').addEventListener('click', async () => {
          let valid = true;
          reviewable.forEach(item => {
            const errEl = modal.querySelector(`.rv-err[data-for="${item.product}"]`);
            if (!ratings[item.product]) { errEl.style.display = ''; valid = false; }
            else                        { errEl.style.display = 'none'; }
          });
          if (!valid) return;

          const submitBtn = modal.querySelector('#submitReviewBtn');
          submitBtn.disabled = true; submitBtn.textContent = 'Submitting…';

          const payload = {
            reviews: reviewable.map(item => ({
              product_id: item.product,
              rating:     ratings[item.product],
              body:       modal.querySelector(`.rv-body[data-pid="${item.product}"]`).value.trim(),
            })),
          };

          try {
            await apiRequest(`/api/orders/my/${orderId}/review/`, 'POST', payload, true);
            modal.remove();
            location.reload();
          } catch (err) {
            const errEl = modal.querySelector('#reviewSubmitErr');
            errEl.textContent = err?.message || 'Failed to submit review. Please try again.';
            errEl.style.display = '';
            submitBtn.disabled = false; submitBtn.textContent = 'Submit Review';
          }
        });
      }

      // Wire review buttons
      root.querySelectorAll('.review-order-btn').forEach(btn => {
        const order = orders.find(o => String(o.id) === btn.dataset.id);
        if (order) btn.addEventListener('click', () => showReviewModal(order.id, order.items));
      });

    } catch (e) {
      root.innerHTML = `<p style="color:#ff3d3d">${e.message || 'Failed to load orders.'}</p>`;
    }

    renderFooter();
  </script>
</body>
</html>
